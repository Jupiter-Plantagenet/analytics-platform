databases:
  - name: analytics-db
    plan: free
    databaseName: analytics_platform
    user: analytics_user

services:
  - type: web
    name: analytics-platform
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx tsx prisma/seed.ts && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: analytics-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: https://analytics-platform.onrender.com
